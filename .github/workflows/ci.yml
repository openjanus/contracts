name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Type check
        working-directory: packages/janus-token
        run: npm run typecheck

      - name: Compile Solidity
        working-directory: packages/janus-token
        run: npm run compile

      - name: Test — Hardhat (unit tests against mock contracts)
        working-directory: packages/janus-token
        run: npm run test:hardhat

      - name: Test — SDK (commitment algebra + integration)
        working-directory: packages/janus-token
        run: npx vitest run tests/sdk/commit.test.ts
        # Integration tests require network — run separately with appropriate gate
        # npx vitest run tests/sdk/integration.test.ts
